<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="Terrain.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        .container {
            position: absolute;
            text-align: center;
            padding: 20px 40px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 2;
        }

        .container:hover {
            transform: scale(1.05);
            background-color: rgba(255, 255, 255, 0.9);
        }

        h1 {
            color: #333;
            margin: 0;
            text-decoration: none;
        }

        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #terrainCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }

        #gameContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 3;
        }

        #score {
            color: white !important;
            font-size: 24px;
            margin: 10px;
        }

        #restartGame {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            display: none;
            margin-top: 10px;
        }

        .copyright {
            position: fixed;
            bottom: 20px;
            text-align: center;
            color: #666;
            font-size: 14px;
            z-index: 2;
        }

        #gameArea {
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <canvas id="terrainCanvas"></canvas>
    <canvas id="particleCanvas"></canvas>
    <div id="gameContainer">
        <div id="score">Score: 0</div>
        <canvas id="gameArea" width="500" height="500"></canvas>
        <button id="restartGame">Restart</button>
    </div>
    <a href="snake.html" class="container" id="startGame" style="text-decoration: none;">
        <h1>Hello, World!</h1>
    </a>
    <div class="copyright">
        Made by Yuan Wang. ©️ Copyright Reserved.
    </div>

    <script>
        // Canvas setup and brush effects
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Random movement for Hello World button
        const container = document.querySelector('.container');
        const containerWidth = container.offsetWidth;
        const containerHeight = container.offsetHeight;

        function moveRandomly() {
            const maxX = window.innerWidth - containerWidth;
            const maxY = window.innerHeight - containerHeight - 100;
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            container.style.left = `${randomX}px`;
            container.style.top = `${randomY}px`;
            const randomRotation = (Math.random() * 30 - 15);
            container.style.transform = `rotate(${randomRotation}deg)`;
        }

        moveRandomly();
        setInterval(moveRandomly, 2000);

        // Ink effect class
        class BrushPoint {
            constructor(x, y, pressure) {
                this.x = x;
                this.y = y;
                this.pressure = pressure;
                this.age = 0;
                this.bristles = [];
                this.bristleCount = 8;
                
                for (let i = 0; i < this.bristleCount; i++) {
                    const angle = (Math.PI * 2 * i) / this.bristleCount;
                    const spread = pressure * 6;
                    this.bristles.push({
                        x: x + Math.cos(angle) * spread,
                        y: y + Math.sin(angle) * spread,
                        opacity: Math.random() * 0.4 + 0.2
                    });
                }

                this.bristles.push({
                    x: x,
                    y: y,
                    opacity: Math.random() * 0.5 + 0.3
                });
            }

            update() {
                this.age++;
                this.bristles.forEach(bristle => {
                    bristle.x += (Math.random() - 0.5) * 0.2;
                    bristle.y += (Math.random() - 0.5) * 0.2;
                    bristle.opacity *= 0.95;
                });
            }

            draw() {
                this.bristles.forEach(bristle => {
                    ctx.fillStyle = `rgba(0, 0, 0, ${bristle.opacity})`;
                    ctx.beginPath();
                    ctx.arc(bristle.x, bristle.y, this.pressure * 1.2, 0, Math.PI * 2);
                    ctx.fill();
                });
            }
        }

        class Brush {
            constructor() {
                this.points = [];
                this.lastX = 0;
                this.lastY = 0;
                this.lastPressure = 0;
            }

            addPoint(x, y) {
                const dx = x - this.lastX;
                const dy = y - this.lastY;
                const velocity = Math.sqrt(dx * dx + dy * dy);
                const pressure = Math.min(Math.max(1 - velocity * 0.015, 0.3), 0.8);

                const steps = Math.max(Math.floor(velocity / 2), 1);
                for (let i = 0; i < steps; i++) {
                    const t = i / steps;
                    const ix = this.lastX + dx * t;
                    const iy = this.lastY + dy * t;
                    const ip = this.lastPressure + (pressure - this.lastPressure) * t;
                    
                    this.points.push(new BrushPoint(ix, iy, ip));
                }

                this.lastX = x;
                this.lastY = y;
                this.lastPressure = pressure;

                if (this.points.length > 50) {
                    this.points = this.points.slice(-50);
                }
            }

            update() {
                this.points.forEach(point => point.update());
                this.points = this.points.filter(point => point.age < 30);
            }

            draw() {
                this.points.forEach(point => point.draw());
            }
        }

        const brush = new Brush();
        let isFirstMove = true;

        canvas.addEventListener('mousemove', (e) => {
            if (isFirstMove) {
                brush.lastX = e.clientX;
                brush.lastY = e.clientY;
                isFirstMove = false;
            }
            brush.addPoint(e.clientX, e.clientY);
        });

        canvas.addEventListener('mouseleave', () => {
            isFirstMove = true;
        });

        // Terrain visualization setup
        const cols = 100;
        const rows = 75;
        const scl = 20;
        const w = 2000;
        const h = 1500;
        let flying = 0;
        let terrain = [];

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ 
            canvas: document.getElementById('terrainCanvas'), 
            alpha: true 
        });
        renderer.setSize(window.innerWidth, window.innerHeight);

        // Initialize terrain array
        for (let x = 0; x < cols; x++) {
            terrain[x] = [];
            for (let y = 0; y < rows; y++) {
                terrain[x][y] = 0;
            }
        }

        // Create geometry
        const geometry = new THREE.PlaneGeometry(w, h, cols - 1, rows - 1);
        const material = new THREE.MeshBasicMaterial({
            color: 0x333333,
            wireframe: true,
            transparent: true,
            opacity: 0.3
        });
        const plane = new THREE.Mesh(geometry, material);
        scene.add(plane);

        // Position camera
        camera.position.z = 1000;
        camera.position.y = -500;
        camera.rotation.x = Math.PI / 3;

        // Noise and map functions
        function noise(x, y) {
            return (Math.sin(x * 1.5) * Math.cos(y * 1.5) + 1) / 2;
        }

        function map(value, start1, stop1, start2, stop2) {
            return start2 + (stop2 - start2) * ((value - start1) / (stop1 - start1));
        }

        // Combined animation loop
        function animate() {
            // Update terrain
            flying -= 0.02;
            
            let yoff = flying;
            for (let y = 0; y < rows; y++) {
                let xoff = 0;
                for (let x = 0; x < cols; x++) {
                    terrain[x][y] = map(noise(xoff, yoff), 0, 1, -100, 100);
                    xoff += 0.2;
                }
                yoff += 0.2;
            }
            
            const vertices = plane.geometry.attributes.position.array;
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const index = (y * cols + x) * 3 + 2;
                    vertices[index] = terrain[x][y];
                }
            }
            plane.geometry.attributes.position.needsUpdate = true;
            
            renderer.render(scene, camera);

            // Update brush effects
            ctx.fillStyle = 'rgba(245, 245, 245, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            brush.update();
            brush.draw();

            requestAnimationFrame(animate);
        }

        // Handle window resize for both canvases
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            resizeCanvas();
        });

        // Start animation
        animate();
    </script>
    <script>
        window.addEventListener('DOMContentLoaded', (event) => {
            initTerrain();
        });
    </script>
    
</body>
</html>
